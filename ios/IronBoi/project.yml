name: IronBoi
options:
  bundleIdPrefix: com.thecombinationrule
  deploymentTarget:
    iOS: "17.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.0.0
targets:
  IronBoi:
    type: application
    platform: iOS
    sources:
      - path: IronBoi
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFunctions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thecombinationrule.ironboi
        PRODUCT_NAME: IronBoi
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: IronBoi
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: MYO uses the microphone so you can speak to your coach.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: MYO uses speech recognition to turn your voice into coach messages.
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: 1
      configs:
        # Debug builds (Xcode Run, internal device builds) talk to staging.
        Debug:
          INFOPLIST_KEY_IronBoiCallableBaseURL: https://us-central1-ironboi-staging.cloudfunctions.net
        # Release builds (archive → TestFlight → App Store) talk to prod.
        # Change this URL if the prod Firebase project id differs.
        Release:
          INFOPLIST_KEY_IronBoiCallableBaseURL: https://us-central1-ironboi-prod.cloudfunctions.net
    entitlements:
      path: IronBoi/IronBoi.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
