name: IronBoi
options:
  bundleIdPrefix: com.thecombinationrule
  deploymentTarget:
    iOS: "17.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.0.0
targets:
  IronBoi:
    type: application
    platform: iOS
    sources:
      - path: IronBoi
    preBuildScripts:
      - name: "Select GoogleService-Info.plist for $CONFIGURATION"
        script: |
          # Phase 3 follow-up — pick staging or prod GoogleService-Info.plist
          # based on the active build configuration. The Firebase SDK reads
          # this file at FirebaseApp.configure() time; one wrong file =
          # users routed to the wrong project.
          set -euo pipefail

          case "$CONFIGURATION" in
            Debug)   SUFFIX=Staging ;;
            Release) SUFFIX=Prod ;;
            *)       SUFFIX=Staging ;;  # ad-hoc / custom configs default to staging
          esac

          SOURCE="$PROJECT_DIR/IronBoi/Firebase/GoogleService-Info-$SUFFIX.plist"
          DEST="$PROJECT_DIR/IronBoi/GoogleService-Info.plist"

          if [ ! -f "$SOURCE" ]; then
            echo "error: $SOURCE not found — see ios/IronBoi/IronBoi/Firebase/README.md"
            exit 1
          fi

          # Warn if prod plist still has placeholder sentinels. Don't fail
          # the build (you might be doing a Release test before populating
          # prod), but make it loud.
          if [ "$SUFFIX" = "Prod" ] && grep -q "REPLACE_WITH_PROD" "$SOURCE"; then
            echo "warning: $SOURCE still contains REPLACE_WITH_PROD_* sentinels — Firebase init will fail at runtime. See ios/IronBoi/IronBoi/Firebase/README.md to populate from the real ironboi-prod project."
          fi

          # Only copy if different — avoids touching mtime + forcing
          # unnecessary downstream rebuilds.
          if ! cmp -s "$SOURCE" "$DEST"; then
            cp -f "$SOURCE" "$DEST"
            echo "Selected $SUFFIX → GoogleService-Info.plist"
          fi
        inputFiles:
          - $(PROJECT_DIR)/IronBoi/Firebase/GoogleService-Info-Staging.plist
          - $(PROJECT_DIR)/IronBoi/Firebase/GoogleService-Info-Prod.plist
        outputFiles:
          - $(PROJECT_DIR)/IronBoi/GoogleService-Info.plist
    dependencies:
      - package: Firebase
        product: FirebaseAppCheck
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFunctions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thecombinationrule.ironboi
        PRODUCT_NAME: IronBoi
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: IronBoi
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: MYO uses the microphone so you can speak to your coach.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: MYO uses speech recognition to turn your voice into coach messages.
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: 1
      configs:
        # Debug builds (Xcode Run, internal device builds) talk to staging.
        Debug:
          INFOPLIST_KEY_IronBoiCallableBaseURL: https://us-central1-ironboi-staging.cloudfunctions.net
        # Release builds (archive → TestFlight → App Store) talk to prod.
        # Change this URL if the prod Firebase project id differs.
        Release:
          INFOPLIST_KEY_IronBoiCallableBaseURL: https://us-central1-ironboi-prod.cloudfunctions.net
    entitlements:
      path: IronBoi/IronBoi.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        # Phase 3 Task 3.2 — App Attest. Use "development" while testing
        # via TestFlight; switch to "production" when shipping to public
        # App Store. The Firebase AppAttestProvider reads this and routes
        # to Apple's matching attestation endpoint.
        com.apple.developer.devicecheck.appattest-environment: production
