# CI: Firebase Functions (typecheck + build + emulator security suite) and a
# paths-gated iOS build.
#
# functions job — every PR and every push to main.
# ios job       — only when files under ios/** changed (macOS runners are slow
#                 and expensive; the cheap `changes` job on ubuntu decides).

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (new push to a PR branch kills the
# in-flight run for the old head).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter lists PR files via the API

jobs:
  functions:
    name: functions (tsc + build + security suite)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Functions deploy on the nodejs22 2nd-gen runtime (firebase.json +
          # functions/package.json "engines") — CI must match.
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # The Firestore emulator is a Java jar.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install
        working-directory: functions
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        working-directory: functions
        run: npm run check

      - name: Build (tsc)
        working-directory: functions
        run: npm run build

      # appCheckEnforcement.test.ts is INCLUDED: enforcement became env-gated
      # (PR #5), the test pins the contract both ways, and the suite is fully
      # green on main.

      - name: Static security lint (no emulator)
        working-directory: functions
        run: npm run lint:security

      - name: Security suite (Firestore emulator)
        # Run from the repo root so firebase-tools picks up firebase.json.
        run: |
          npx firebase-tools emulators:exec --only firestore --project demo-ironboi-security \
            "cd functions && npx vitest run test/security --fileParallelism=false"

  # Cheap ubuntu job that decides whether the expensive macOS job runs at all.
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      # Needed for push events (paths-filter diffs against the pre-push
      # commit); PR events use the GitHub API instead.
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            ios:
              - 'ios/**'

  ios:
    name: ios (xcodebuild, simulator, no signing)
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    # macos-15 required: the project is objectVersion 77 (Xcode 16.3+ format);
    # macos-14's Xcode 15 cannot open it.
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # ios/IronBoi/IronBoi.xcodeproj (project.pbxproj + shared IronBoi
      # scheme) is committed, so no xcodegen step is needed even though
      # ios/IronBoi/project.yml exists. The "Select GoogleService-Info.plist"
      # pre-build phase copies the committed Staging plist into place for
      # Debug builds, so a clean checkout builds without secrets.
      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (Debug, iOS Simulator)
        run: >-
          xcodebuild
          -project ios/IronBoi/IronBoi.xcodeproj
          -scheme IronBoi
          -destination 'generic/platform=iOS Simulator'
          -configuration Debug
          build
          CODE_SIGNING_ALLOWED=NO
